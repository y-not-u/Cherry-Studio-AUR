name: Check and update AUR package

on:
  schedule:
    - cron: '0 10,22 * * *'
  workflow_dispatch:

jobs:
  check_and_update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel jq git openssh curl
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Create build user and setup permissions
        run: |
          # Create build user with explicit group
          useradd -m -U builduser
          # Get current working directory
          WORKDIR=$(pwd)
          echo "WORKDIR=$WORKDIR" >> $GITHUB_ENV
          # Give builduser access to files
          chown -R builduser:builduser "$WORKDIR"
          # Ensure builduser can read all files
          chmod -R g+rwX "$WORKDIR"
      - name: Get latest upstream version
        run: |
          VERSION=$(bash scripts/resolve_upstream_release.sh)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not resolve a release with required AppImage assets."
            exit 1
          fi
          echo "Latest usable upstream version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Get current version
        run: |
          CURRENT_VERSION=$(grep -oP '^pkgver=\K.*' PKGBUILD)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Warning: pkgver not found in PKGBUILD. Defaulting to 0.0.0."
            CURRENT_VERSION="0.0.0"
          fi
          echo "Current version: $CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
      - name: Compare versions and update if needed
        run: |
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Upstream version is empty or 'null'. Cannot proceed with update."
            exit 1
          fi

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "Versions are the same ($CURRENT_VERSION), skipping update"
            echo "SHOULD_UPDATE=false" >> $GITHUB_ENV
          else
            echo "Version different (upstream: $VERSION, current: $CURRENT_VERSION), proceeding with update"
            echo "SHOULD_UPDATE=true" >> $GITHUB_ENV
          fi
      - name: Update PKGBUILD version (as builduser)
        if: env.SHOULD_UPDATE == 'true'
        run: |
          cd "$WORKDIR"
          echo "Updating PKGBUILD to version: $VERSION"

          # Switch to builduser for file operations
          su builduser -c "
            cd '$WORKDIR'

            # Update pkgver - use different delimiter to avoid issues with version numbers
            sed -i 's|^pkgver=.*|pkgver=$VERSION|' PKGBUILD
            sed -i 's|^pkgrel=.*|pkgrel=1|' PKGBUILD

            # Verify the changes
            echo 'Updated PKGBUILD:'
            grep -E '^(pkgver|pkgrel|pkgname)=' PKGBUILD
          "
      - name: Calculate checksums and generate .SRCINFO (as builduser)
        if: env.SHOULD_UPDATE == 'true'
        run: |
          chown -R builduser:builduser "$WORKDIR"
          cd "$WORKDIR"
          su builduser -c "
            set -euo pipefail

            # Download AppImages for both architectures
            curl -fL -o \"cherry-studio-${VERSION}-x86_64.AppImage\" \"https://github.com/cherryHQ/cherry-studio/releases/download/v${VERSION}/Cherry-Studio-${VERSION}-x86_64.AppImage\"
            curl -fL -o \"cherry-studio-${VERSION}-arm64.AppImage\" \"https://github.com/cherryHQ/cherry-studio/releases/download/v${VERSION}/Cherry-Studio-${VERSION}-arm64.AppImage\"

            # Compute checksums
            x86_checksum=\$(sha256sum \"cherry-studio-${VERSION}-x86_64.AppImage\" | awk '{print \$1}')
            arm64_checksum=\$(sha256sum \"cherry-studio-${VERSION}-arm64.AppImage\" | awk '{print \$1}')

            # Update checksums in PKGBUILD
            sed -i \"/^case \\\"\\\$CARCH\\\" in/,/^esac\$/ {
              /x86_64)/ {
                n
                s/_sha256sum=.*/_sha256sum='\$x86_checksum'/
              }
              /aarch64)/ {
                n
                s/_sha256sum=.*/_sha256sum='\$arm64_checksum'/
              }
            }\" PKGBUILD

            # Generate .SRCINFO
            makepkg --printsrcinfo > .SRCINFO
          "
      - name: Configure git safe directory
        if: env.SHOULD_UPDATE == 'true'
        run: |
          git config --global --add safe.directory "$WORKDIR"
      - name: Commit changes
        if: env.SHOULD_UPDATE == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update to ${{ env.VERSION }}"
          add: "PKGBUILD .SRCINFO"
          push: true
          default_author: github_actions
      - name: Publish AUR package
        if: env.SHOULD_UPDATE == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: cherry-studio-bin
          pkgbuild: ./PKGBUILD
          assets: |
            ./cherry-studio.desktop
            ./cherry-studio.png
            ./cherry-studio-bin.sh
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Update AUR package
          ssh_keyscan_types: rsa,ecdsa,ed25519
